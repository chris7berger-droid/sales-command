
# S6 — check-orphan-users is a CRON target, not a user-facing function. There is
# no caller JWT to forward, so the project's blanket `--no-verify-jwt` deploy
# convention is deliberately OVERRIDDEN here: deploy this function WITHOUT
# --no-verify-jwt so verify_jwt=true stands. The platform gate rejects requests
# with no valid JWT/service-role key; the handler's x-cron-secret check is the
# sole gate that distinguishes the scheduled invoker from any logged-in user.
[functions.check-orphan-users]
enabled = true
verify_jwt = true

[functions.qb-auth]
enabled = true
verify_jwt = false

[functions.send-proposal]
enabled = true
verify_jwt = true
import_map = "./functions/send-proposal/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/send-proposal/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/send-proposal/*.html" ]
